name: CI — Auth Service

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel in-progress runs for the same branch/PR.
# This prevents queued CI runs from blocking a busy PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  IMAGE_NAME: ghcr.io/stagepass-aiman/stagepass-auth-service

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Secrets scan
  # Runs first — no point continuing if secrets are committed. (NFR-SEC-013)
  # Uses gitleaks CLI directly — gitleaks-action requires a paid license for orgs.
  # ─────────────────────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for accurate secret scanning.

      - name: Install and run gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks detect --source . --verbose

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build + Unit Tests + Coverage gate
  # ─────────────────────────────────────────────────────────────────────────────
  unit-test:
    name: Unit Tests + Coverage Gate
    runs-on: ubuntu-latest
    needs: [secrets-scan]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven   # Cache ~/.m2 across runs.

      - name: Generate test RSA key pair
        # Tests need a real key pair. Generate one in CI — never commit a key.
        run: |
          openssl genrsa -out /tmp/auth-private.pem 2048
          openssl pkcs8 -topk8 -inform PEM -outform DER -in /tmp/auth-private.pem -nocrypt \
            | base64 -w 0 > /tmp/auth-private.b64
          openssl rsa -in /tmp/auth-private.pem -pubout -outform DER \
            | base64 -w 0 > /tmp/auth-public.b64
          echo "AUTH_RSA_PRIVATE_KEY=$(cat /tmp/auth-private.b64)" >> $GITHUB_ENV
          echo "AUTH_RSA_PUBLIC_KEY=$(cat /tmp/auth-public.b64)" >> $GITHUB_ENV

      - name: Run unit tests with coverage and enforce threshold (NFR-MAINT-001)
        # mvn verify runs: compile → test → jacoco:report → jacoco:check
        # The 80% branch coverage gate is configured in pom.xml bound to the verify phase.
        # Never call jacoco:check directly — it has no rules when called as a standalone goal.
        run: mvn verify -Dtest="**/unit/**" -DfailIfNoTests=true -DskipITs=true
        env:
          AUTH_RSA_PRIVATE_KEY: ${{ env.AUTH_RSA_PRIVATE_KEY }}
          AUTH_RSA_PUBLIC_KEY: ${{ env.AUTH_RSA_PUBLIC_KEY }}
          APP_JWT_KEY_ID: ci-test-key

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: target/site/jacoco/

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Integration Tests (Testcontainers)
  # Testcontainers requires Docker — ubuntu-latest runners have Docker installed.
  # ─────────────────────────────────────────────────────────────────────────────
  integration-test:
    name: Integration Tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: [secrets-scan]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Generate test RSA key pair
        run: |
          openssl genrsa -out /tmp/auth-private.pem 2048
          openssl pkcs8 -topk8 -inform PEM -outform DER -in /tmp/auth-private.pem -nocrypt \
            | base64 -w 0 > /tmp/auth-private.b64
          openssl rsa -in /tmp/auth-private.pem -pubout -outform DER \
            | base64 -w 0 > /tmp/auth-public.b64
          echo "AUTH_RSA_PRIVATE_KEY=$(cat /tmp/auth-private.b64)" >> $GITHUB_ENV
          echo "AUTH_RSA_PUBLIC_KEY=$(cat /tmp/auth-public.b64)" >> $GITHUB_ENV

      - name: Run integration tests (Failsafe)
        # -Dsurefire.skip=true skips unit tests (Surefire) while Failsafe still
        # runs *IT.java integration tests during the verify phase.
        # Testcontainers spins up postgres:16-alpine and redis:7-alpine automatically.
        run: mvn verify -Dsurefire.skip=true -Djacoco.skip=true -q
        env:
          AUTH_RSA_PRIVATE_KEY: ${{ env.AUTH_RSA_PRIVATE_KEY }}
          AUTH_RSA_PUBLIC_KEY: ${{ env.AUTH_RSA_PUBLIC_KEY }}
          APP_JWT_KEY_ID: ci-it-key
          # Testcontainers reuse is disabled in CI (no persistent Docker daemon state).
          TESTCONTAINERS_REUSE_ENABLE: "false"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4 — SAST (Semgrep)
  # Runs after unit tests (needs the compiled class files and coverage report).
  # Blocks on HIGH severity findings. (NFR-SEC-010)
  # ─────────────────────────────────────────────────────────────────────────────
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: [unit-test]

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/java
            p/owasp-top-ten
            p/secrets
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 5 — SCA (Dependency vulnerability scan)
  # Blocks on CRITICAL CVEs in dependencies. (NFR-SEC-011)
  # ─────────────────────────────────────────────────────────────────────────────
  sca:
    name: SCA (Trivy — dependencies)
    runs-on: ubuntu-latest
    needs: [unit-test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build fat JAR for Trivy scan
        run: mvn package -DskipTests -q

      - name: Run Trivy (JAR dependency scan)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: '0'   # Block on CRITICAL CVEs.
          format: table
          trivyignores: .trivyignore

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 6 — Docker Build + Container Scan
  # Only runs if unit + integration tests pass.
  # Blocks on CRITICAL CVEs in the container image. (NFR-SEC-012)
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-scan:
    name: Docker Build + Container Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push — scan first)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Export to local Docker daemon for Trivy scan.
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan container image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: CRITICAL
          exit-code: '1'
          format: sarif
          output: trivy-image.sarif
          trivyignores: .trivyignore

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-image.sarif

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max